name: Update Lunch Options
on:
  repository_dispatch:
    types: [update-options]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Update JSON
        run: |
          echo '${{ github.event.client_payload.options }}' > options.json
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add options.json
          git commit -m "Update lunch options via web"
          git push
